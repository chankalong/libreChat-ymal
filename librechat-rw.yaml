version: 1.3.13
cache: true
fileStrategy: "azure_blob"
registration:
  allowedDomains:
    - "bokss.org.hk"
endpoints:
  agents:
    recursionLimit: 50
    maxRecursionLimit: 100
    disableBuilder: false
  custom:
    # OpenRouter.ai
    # Model list: https://openrouter.ai/models
    # Script to fetch models: https://github.com/LibreChat-AI/librechat-config-yaml/blob/main/scripts/openrouter.py
    - name: "多模型互補"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: [
          "---先由多個模型同時進行並處理---",
          "---再由審查模型對各回答進行分析---",
          "---最後整合出最好的回答---",
          "---真係好貴好貴好貴好貴---",
          "---真係好貴好貴好貴好貴---",
          "---真係好貴好貴好貴好貴---",
          "---諗清楚先好用---",
          "openrouter/fusion",
          ]
        fetch: false
      titleConvo: true
      summarize: false
      modelDisplayLabel: "多模型互補"
    - name: "最勁最貴最慢AI"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: [
          "---真係好貴---",
          "---真係好貴---",
          "---真係好貴---",
          "---諗清楚先好用---",
          "openai/gpt-5.5",
          "openai/gpt-5.4",
          "openai/gpt-5.3-chat",
          "openai/gpt-5.3-codex",
          "anthropic/claude-opus-4.8",
          "google/gemini-3.1-pro-preview",
          "x-ai/grok-4.5",
          "x-ai/grok-build-0.1",
          "x-ai/grok-4.20-multi-agent",
          "perplexity/sonar-reasoning-pro",
          "perplexity/sonar-pro-search"
          ]
        fetch: false
      titleConvo: true
      summarize: false
      modelDisplayLabel: "我係最勁最貴最慢嘅AI"
    - name: "國產頂級AI"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: [
          "z-ai/glm-5.2",
          "z-ai/glm-5-turbo",
          "deepseek/deepseek-v4-pro",
          "moonshotai/kimi-k2.7-code",
          "moonshotai/kimi-k2.6",
          "xiaomi/mimo-v2.5-pro",
          "tencent/hy3"
          ]
        fetch: false
      titleConvo: true
      summarize: false
      modelDisplayLabel: "我係國產頂級AI"
    - name: "適合一般用途嘅AI"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: [
          "openai/gpt-5.4-mini",
          "anthropic/claude-sonnet-5",
          "google/gemini-3.5-flash",
          "perplexity/sonar-pro",
          "perplexity/sonar-reasoning",
          "perplexity/r1-1776",
          "minimax/minimax-m3",
          "xiaomi/mimo-v2.5",
          "qwen/qwen3.6-27b"
          ]
        fetch: false
      titleConvo: true
      summarize: false
      modelDisplayLabel: "我係適合一般用途嘅AI"
    - name: "超平超快超廢"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: [
          "anthropic/claude-haiku-4.5",
          "openai/gpt-5.4-nano",
          "google/gemini-3.1-flash-lite",          
          "z-ai/glm-4.7-flash",
          "qwen/qwen3.6-35b-a3b",
          "perplexity/sonar",
          "deepseek/deepseek-v4-flash"
          ]
        fetch: false
      titleConvo: true
      summarize: false
      modelDisplayLabel: "我係超平超快超廢嘅AI"
  azureOpenAI:
    # Endpoint-level configuration
    titleModel: "gpt-4.1-nano"
    groups:
    # Group-level configuration
    - group: "ai-imhs-westus3"
      apiKey: "${IMAGE_GEN_OAI_API_KEY}"
      instanceName: "ai-imhs-westus3"
      version: "2025-04-01-preview"
      # Model-level configuration
      models:
        gpt-4.1-nano:
          deploymentName: gpt-4.1-nano
        gpt-4.1:
          deploymentName: gpt-4.1
mcpServers:  
  # Production-ready cloud service
  google-image-lite:
    type: streamable-http
    url: https://image-generate-googlelite-mcp.vercel.app/api/mcp
    timeout: 300000
    serverInstructions: true
    requiresOAuth: false
    chatMenu: true
    headers:
      X-Auth-Token: "${MCP_GOOGLE_IMAGE_AUTH_TOKENS}"
  google-image:
    type: streamable-http
    url: https://image-generate-mcp.vercel.app/api/mcp
    timeout: 300000
    serverInstructions: true
    requiresOAuth: false
    chatMenu: true
    headers:
      X-Auth-Token: "${MCP_GOOGLE_IMAGE_AUTH_TOKENS}"
  openai-image:
    type: streamable-http
    url: https://image-generate-openai-mcp.vercel.app/api/mcp
    timeout: 300000
    serverInstructions: true
    requiresOAuth: false
    chatMenu: true
    headers:
      X-Auth-Token: "${MCP_GOOGLE_IMAGE_AUTH_TOKENS}"
  convert-to-excel:
    type: streamable-http
    url: https://convert-excel.vercel.app/api/mcp
    timeout: 300000
    serverInstructions: true
    chatMenu: true
ocr:
  mistralModel: "${AZURE_MISTRAL_OCR_MODEL}"              # Should match your Azure deployment name
  apiKey: "${AZURE_MISTRAL_OCR_API_KEY}"                 # Reference to your Azure API key in .env
  baseURL: "${AZURE_MISTRAL_OCR_URL}"  # Your Azure endpoint
  strategy: "azure_mistral_ocr"                          # Use Azure strategy
messageFilter:
  pii:
    starterPatterns:
      - sk_prefix
      - bearer_header
      - api_key_header
    customPatterns:
      - id: anthropic_api_key
        label: Anthropic API key
        regex: 'sk-ant-[A-Za-z0-9_-]{20,}'
      - id: hkid
        label: HKID
        regex: '\(?\s*[A-Za-z]\s*(?:\d\s*){6}\s*\)?(?:\s*\(?\s*[0-9Aa]\s*\)?)?'
skillSync:
  github:
    enabled: true
    intervalMinutes: 60
    runOnStartup: true
    sources:
      - id: steve-jobs-skill
        owner: chankalong
        repo: steve-jobs-skill
        ref: main
        paths:
          - .
        skillDiscoveryDepth: 2
        token: '${GITHUB_SKILLS_TOKEN}'
interface:
  skills:
    use: true
    create: true
    share: true
    public: true
    defaultActiveOnShare: true
  defaultPinnedTools:
    - skills
    - mcp
